<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.css"
    integrity="sha512-zylce7fP6h4usg536JBTRj2rt7q22Z0qicHSlgSK53Irtfkz37ate3KCQ59du+aXZV6R3yyL2X1LyGKBEUMZaw=="
    crossorigin="anonymous" />
  <title>Document</title>
</head>

<body>
  <div class="container d-flex flex-column gap-3">
    <h1 class="col-12 text-center">Inventory System</h1>
    <div class="col-12 d-flex gap-3">
      <button class="btn btn-dark col-3" onclick="showPhones()">Show Phones</button>
      <!-- Button trigger modal -->
      <button type="button" class="btn btn-primary col-3" data-bs-toggle="modal" data-bs-target="#addNewPhone">
        Add New Phone
      </button>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="addNewPhone" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="col-12 d-flex flex-column p-4 bg-white rounded shadow border gap-3">
            <h3>Add New Phone</h3>
            <input class="form-control" id="nameInput" type="text" placeholder="Enter The New Phone Name">
            <input class="form-control" id="priceInput" type="text" placeholder="Enter The New Phone Price">
            <input class="form-control" id="qtyInput" type="text" placeholder="Enter The New Phone Qty">
            <button class="btn btn-success col-12" ondblclick="addNewPhone()">Add New Phone</button>
          </div>
        </div>
      </div>
    </div>


    <div class="modal fade" id="editPhoneData" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="col-12 d-flex flex-column p-4 bg-white rounded shadow border gap-3">
            <h3>Edit Phone Data</h3>
            <input class="form-control" id="editNameInput" type="text" placeholder="Enter The New Phone Name">
            <input class="form-control" id="editPriceInput" type="text" placeholder="Enter The New Phone Price">
            <input class="form-control" id="editQtyInput" type="text" placeholder="Enter The New Phone Qty">
            <button class="btn btn-info col-12" ondblclick="saveUpdates()">Save Updates</button>
          </div>
        </div>
      </div>
    </div>



    <table id="phoneData" class="table table-dark table-bordered">
      <thead>
        <tr>
          <th>#</th>
          <th>Item Name</th>
          <th>Item Price</th>
          <th>Item Qty</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="./index.js"></script>
</body>

</html>
